# ===========================================================================
# Qwen3.6-27B (Lorbus AutoRound INT4 + BF16 mtp.fc preserved) — single 3090 (TP=1)
#
# No spec-decode, no source patches — vanilla vllm/vllm-openai. Extracted from
# club-3090's models/qwen3.6-27b/vllm/compose/single/autoround-int4/minimal.yml.
# Values are hardcoded for this rig (single-machine dotfiles, not a shared
# template) — only the HF token and a couple of rare debug knobs stay in .env.
# ===========================================================================
services:
  vllm-qwen36-27b-solo:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:v0.22.0}
    container_name: vllm-qwen36-27b-solo
    restart: unless-stopped
    ports:
      - "0.0.0.0:11434:8000"
    volumes:
      - /home/kinetic/data/llm-models:/root/.cache/huggingface
      # torch.compile + Triton kernel caches — first boot warms (~60-90 sec);
      # subsequent boots reuse cached graphs.
      - /home/kinetic/data/llm-cache/torch_compile:/root/.cache/vllm/torch_compile_cache
      - /home/kinetic/data/llm-cache/triton:/root/.triton/cache
      # froggeric/Qwen-Fixed-Chat-Templates qwen3.6 — fixes default-template bugs
      # (empty <think></think> spam, unclosed think before tool call, etc.)
      - ../patches/chat_template.jinja:/etc/qwen-froggeric-chat-template.jinja:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_NO_USAGE_STATS=1
      # expandable_segments:True crashes boot on some setups (cuMemMap path) —
      # override via .env: PYTORCH_CUDA_ALLOC_CONF=expandable_segments:False
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True}
      - OMP_NUM_THREADS=1
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint:
      - /bin/bash
      - -c
      - |
        # VLLM_ENFORCE_EAGER=1 in .env disables CUDA graphs — use on
        # hardware where graph capture causes OOM or instability.
        exec vllm serve ${VLLM_ENFORCE_EAGER:+--enforce-eager} "$@"
      - --
    command:
      - --model
      - /root/.cache/huggingface/qwen3.6-27b-autoround-int4
      - --served-model-name
      - qwen3.6-27b-autoround
      - --quantization
      - auto_round
      - --dtype
      - float16
      - --tensor-parallel-size
      - "1"
      - --pipeline-parallel-size
      - "1"
      - --max-model-len
      - "32768"
      - --gpu-memory-utilization
      # 0.82 (used by dual) leaves solo just short of enough VRAM for KV
      # cache on a single 3090 — needs its own, higher value.
      - "0.92"
      - --max-num-seqs
      - "1"
      - --kv-cache-dtype
      - "${KV_CACHE_DTYPE:-fp8_e5m2}"
      - --trust-remote-code
      - --chat-template
      - /etc/qwen-froggeric-chat-template.jinja
      - --reasoning-parser
      - qwen3
      - --default-chat-template-kwargs
      - '{"enable_thinking": false}'
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --override-generation-config
      - '{"temperature":${TEMP:-0.6},"top_p":${TOP_P:-0.95},"top_k":${TOP_K:-20},"min_p":${MIN_P:-0.0},"repetition_penalty":${REPEAT_PENALTY:-1.0}}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
