# ===========================================================================
# Qwen3.6-27B (unsloth/Qwen3.6-27B-MTP-GGUF, Q5_K_M) — MAINLINE llama.cpp,
# dual-GPU, text-only, MTP speculative decoding, full native context.
#
# Replaces the archived ik_llama.cpp single-GPU config
# (archive/qwen3.6-27b-ik-iq4ks-mtp-solo.yml.bak). Switched off ik_llama.cpp
# because we don't need its Hadamard KV transforms (-khad/-vhad) or
# recurrent-checkpoint tuning to hit these targets on mainline, and its own
# MTP support (--spec-type draft-mtp, renamed from ik_llama's `mtp:n_max=N`
# syntax) is confirmed working for this model family.
#
# NOTE: mainline llama.cpp does not support --mmproj + MTP together (per
# unsloth's own Qwen3.6-27B-MTP-GGUF README: "-np > 1 and --mmproj are not
# yet supported with MTP"). Vision was dropped from scope for this config —
# text-only, MTP-enabled, is the priority.
#
# Weight quant vs KV quant tradeoff (revisited after first landing on Q6_K
# weights + q4_0 KV): weight quantization error is static and averages out
# across a forward pass — Q6_K is already near-lossless. KV cache
# quantization error instead corrupts specific cached token
# representations that attention retrieves from, and that degradation
# compounds with distance — it hits long-context recall directly, which is
# the whole point of running a 262K window. So KV precision matters more
# here than shaving the last bit off already-high weight quality. Traded
# Q6_K -> Q5_K_M weights (still very mild loss) to free enough VRAM for
# q8_0 KV (up from q4_0) at the same full context and the same margin
# targets.
#
# Architecture note: Qwen3.6-27B is a hybrid DeltaNet/full-attention model —
# only 16 of 64 layers are real full-attention (KV-cache-bearing); the other
# 48 are linear-attention (small fixed-size recurrent state, doesn't scale
# with context). This is why full 262144-token context is affordable at all
# on two 24GB cards even with q8_0 KV: ~2048 KV elements/token across the 16
# full-attention layers, not 64.
#
# GPU split: explicit --tensor-split skewed heavily toward GPU1 — the goal
# is MINIMAL GPU0 usage (headless card GPU1 should carry as much as it can
# hold on its own; GPU0 is the display/gaming card and should only take the
# unavoidable overflow). The pi-subagents scout service that used to live
# on GPU0 has been retired (subagent experiment didn't pan out), freeing up
# GPU0's budget for this spillover instead.
#
# GOTCHA: -ts fraction order follows the driver's native CUDA device
# numbering (0, 1), NOT the order GPUs are listed in `device_ids:` below —
# confirmed via `nvidia-smi -L` inside the container. First tried
# device_ids ["1","0"] assuming that would make GPU1 CUDA-device-0; it
# didn't. -ts "0.82,0.18" under that wrong assumption loaded GPU0 (the
# display card) to 23.5GB/523MB-free and left GPU1 nearly idle — exactly
# backwards. Fixed by treating -ts as [GPU0 fraction, GPU1 fraction]
# unconditionally, regardless of device_ids list order.
#
# GOTCHA: -ts fraction -> layer split is quantized to discrete boundaries,
# not continuous — 0.34/0.345/0.348 all landed on the same 22-layer/GPU0
# split, and 0.352/0.36 all landed on the same 23-layer split, with a big
# jump in VRAM between them (~800MB per GPU). Fine 0.01-scale nudging
# doesn't always do anything; expect to jump between a small number of
# discrete states near your target and pick the closest one.
#
# MEASURED: ladder-tested at full 262144 ctx-size, Q5_K_M weights, q8_0/
# q8_0 KV. -ts "0.34,0.66" settled: GPU0 ~10.5-10.6GB free (target ~10GB),
# GPU1 ~480-530MB free (target ~600MB, slightly thin but stable — the next
# discrete split up put GPU0 ~440MB under target instead, a worse
# trade). KV cache is fully pre-allocated at boot (--ctx-size sizes it
# upfront, doesn't grow with use) — confirmed via a real 230,008-token
# prefill: VRAM read 486MB free on GPU1 throughout the ~6.5 minute prefill
# (585 tok/s) and after (vs 530MB at boot — the ~44MB delta is decode
# scratch space, stable, no growth risk). MTP acceptance ~61-87% depending
# on prompt (measured on real requests, not synthetic filler),
# draft_n_max=2, ~29-60 tok/s decode.
# ===========================================================================
services:
  llama-qwen36-27b-q5km-mtp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-qwen36-27b-q5km-mtp
    restart: unless-stopped
    ports:
      - "0.0.0.0:11434:8080"
    volumes:
      - /home/kinetic/data/llm-models/qwen3.6-27b-gguf/unsloth-mtp-q5km:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              # List order here does NOT control -ts fraction order — see
              # header gotcha note. -ts below is [GPU0 fraction, GPU1
              # fraction] regardless of this list's order.
              device_ids: ["0", "1"]
              capabilities: [gpu]
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --model
      - /models/Qwen3.6-27B-Q5_K_M.gguf
      - --no-mmap
      - -ngl
      - "99"
      - -sm
      - layer
      # Settled — [GPU0 fraction, GPU1 fraction]. ~10.5-10.6GB free on
      # GPU0, ~480-530MB free on GPU1 at full 262144 ctx. See header for
      # the ladder-test history and the device-order/layer-boundary
      # gotchas.
      - -ts
      - "0.34,0.66"
      - --ctx-size
      - "262144"
      - -b
      - "2048"
      - -ub
      - "1024"
      - -np
      - "1"
      - -ctk
      - q8_0
      - -ctv
      - q8_0
      - -fa
      - "on"
      - --spec-type
      - draft-mtp
      - --spec-draft-n-max
      - "2"
      - --spec-draft-p-min
      - "0.0"
      - --jinja
      - --reasoning
      - "on"
      - --reasoning-format
      - deepseek
      - --chat-template-kwargs
      - '{"enable_thinking":true,"preserve_thinking":true}'
      - --temp
      - "0.6"
      - --top-p
      - "0.95"
      - --top-k
      - "20"
      - --min-p
      - "0"
      - --presence-penalty
      - "0.2"
      - --repeat-penalty
      - "1.0"
