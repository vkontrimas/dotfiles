# ===========================================================================
# Qwen3.6-27B (unsloth/Qwen3.6-27B-MTP-GGUF, Q6_K) — MAINLINE llama.cpp,
# dual-GPU, text-only, MTP speculative decoding, full native context.
#
# Replaces the archived ik_llama.cpp single-GPU config
# (archive/qwen3.6-27b-ik-iq4ks-mtp-solo.yml.bak). Switched off ik_llama.cpp
# because we don't need its Hadamard KV transforms (-khad/-vhad) or
# recurrent-checkpoint tuning to hit these targets on mainline; mainline gets
# us a bigger (Q6_K vs IQ4_KS), higher-quality quant with room to spare once
# spread across both GPUs, and its own MTP support (--spec-type draft-mtp,
# renamed from ik_llama's `mtp:n_max=N` syntax) is confirmed working for this
# model family.
#
# NOTE: mainline llama.cpp does not support --mmproj + MTP together (per
# unsloth's own Qwen3.6-27B-MTP-GGUF README: "-np > 1 and --mmproj are not
# yet supported with MTP"). Vision was dropped from scope for this config —
# text-only, MTP-enabled, is the priority.
#
# Architecture note: Qwen3.6-27B is a hybrid DeltaNet/full-attention model —
# only 16 of 64 layers are real full-attention (KV-cache-bearing); the other
# 48 are linear-attention (small fixed-size recurrent state, doesn't scale
# with context). This is why full 262144-token context is affordable at all
# on two 24GB cards: ~2048 KV elements/token across the 16 full-attention
# layers, not 64. Initially tried q8_0 KV (~8.4GB total at full context) —
# OOM'd on GPU1 even skewing the split hard toward it. Dropped to q4_0
# KV (~4.2GB total), which closed the gap and fit comfortably within both
# margin targets below. "Decent" quant here means q4_0, not the q8_0
# originally hoped for — full context won out over KV precision.
#
# GPU split: explicit --tensor-split skewed heavily toward GPU1 — the goal
# is MINIMAL GPU0 usage (headless card GPU1 should carry as much as it can
# hold on its own; GPU0 is the display/gaming card and should only take the
# unavoidable overflow). The pi-subagents scout service that used to live
# on GPU0 has been retired (subagent experiment didn't pan out), freeing up
# GPU0's budget for this spillover instead.
#
# GOTCHA: -ts fraction order follows the driver's native CUDA device
# numbering (0, 1), NOT the order GPUs are listed in `device_ids:` below —
# confirmed via `nvidia-smi -L` inside the container. First tried
# device_ids ["1","0"] assuming that would make GPU1 CUDA-device-0; it
# didn't. -ts "0.82,0.18" under that wrong assumption loaded GPU0 (the
# display card) to 23.5GB/523MB-free and left GPU1 nearly idle — exactly
# backwards. Fixed by treating -ts as [GPU0 fraction, GPU1 fraction]
# unconditionally, regardless of device_ids list order.
#
# MEASURED: ladder-tested at full 262144 ctx-size, q4_0/q4_0 KV. -ts
# "0.37,0.63" settled: GPU0 ~9.9-10.0GB free (target ~10GB), GPU1
# ~600-960MB free (target ~600MB) — consistent across repeated boots
# (small run-to-run variance from allocator fragmentation, always close to
# target). KV cache is fully pre-allocated at boot (--ctx-size sizes it
# upfront, doesn't grow with use) — confirmed via a real 230,008-token
# prefill: VRAM readings were bit-for-bit identical throughout the ~6.4
# minute prefill (598 tok/s) and after, no OOM risk from context growth.
# MTP acceptance ~61-85% depending on prompt (measured on real requests,
# not synthetic filler), draft_n_max=2, ~29-50 tok/s decode.
# ===========================================================================
services:
  llama-qwen36-27b-q6k-mtp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-qwen36-27b-q6k-mtp
    restart: unless-stopped
    ports:
      - "0.0.0.0:11434:8080"
    volumes:
      - /home/kinetic/data/llm-models/qwen3.6-27b-gguf/unsloth-mtp-q6k:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              # List order here does NOT control -ts fraction order — see
              # header gotcha note. -ts below is [GPU0 fraction, GPU1
              # fraction] regardless of this list's order.
              device_ids: ["0", "1"]
              capabilities: [gpu]
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --model
      - /models/Qwen3.6-27B-Q6_K.gguf
      - --no-mmap
      - -ngl
      - "99"
      - -sm
      - layer
      # Settled — [GPU0 fraction, GPU1 fraction]. ~9.9-10GB free on GPU0,
      # ~600-960MB free on GPU1 at full 262144 ctx. See header for the
      # ladder-test history and the device-order gotcha.
      - -ts
      - "0.37,0.63"
      - --ctx-size
      - "262144"
      - -b
      - "2048"
      - -ub
      - "1024"
      - -np
      - "1"
      - -ctk
      - q4_0
      - -ctv
      - q4_0
      - -fa
      - "on"
      - --spec-type
      - draft-mtp
      - --spec-draft-n-max
      - "2"
      - --spec-draft-p-min
      - "0.0"
      - --jinja
      - --reasoning
      - "on"
      - --reasoning-format
      - deepseek
      - --chat-template-kwargs
      - '{"enable_thinking":true,"preserve_thinking":true}'
      - --temp
      - "0.6"
      - --top-p
      - "0.95"
      - --top-k
      - "20"
      - --min-p
      - "0"
      - --presence-penalty
      - "0.2"
      - --repeat-penalty
      - "1.0"
