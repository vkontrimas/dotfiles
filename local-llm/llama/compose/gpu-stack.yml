# ===========================================================================
# Combined stack: GPU1 main model (Qwen3.6-27B-MTP-IQ4_KS, single-GPU,
# text-only) + GPU0 scout model, running together.
#
# Scout: single mainline llama.cpp server with -np 4 parallel slots.
# Replaces the old 2x ik-llama replica architecture (scout-a + scout-b)
# that duplicated model weights across two separate processes.
#
# Single container = single model load (~3.7GB Q6_K), shared KV cache
# across all slots, proper BPS continuous batching, prefix caching.
# MTP is disabled (--np > 1 and speculative decoding are mutually exclusive
# in llama.cpp — single-sequence draft verification only).
#
# Keep the GPU1 main model service in sync with
# qwen3.6-27b-ik-iq4ks-mtp-solo.yml if that gets re-tuned.
# ===========================================================================
services:
  # -----------------------------------------------------------------------
  # GPU 1: Main model — ik_llama.cpp fork (MTP + recurrent checkpointing)
  # -----------------------------------------------------------------------
  ik-llama-qwen36-27b-mtp-iq4ks-solo:
    image: ghcr.io/ikawrakow/ik-llama-cpp@sha256:5f914f1ccade922417af58c94bd1cbb558052c8852d86678ead3fe693eec0143
    container_name: ik-llama-qwen36-27b-mtp-iq4ks-solo
    restart: unless-stopped
    ports:
      - "0.0.0.0:11434:8080"
    volumes:
      - /home/kinetic/data/llm-models/qwen3.6-27b-gguf/ubergarm-mtp-iq4ks:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --model
      - /models/Qwen3.6-27B-MTP-IQ4_KS.gguf
      - --no-mmap
      - -ngl
      - "99"
      - --ctx-size
      - "213000"
      - -b
      - "4096"
      - -ub
      - "1024"
      - -np
      - "1"
      - -ctk
      - q4_0
      - -ctv
      - q4_0
      - -khad
      - -vhad
      - -ngld
      - "99"
      - --spec-type
      - mtp:n_max=2,p_min=0.0
      - --recurrent-ckpt-mode
      - auto
      - --merge-qkv
      - -fa
      - "on"
      - --jinja
      - --parallel-tool-calls
      - --reasoning
      - "on"
      - --reasoning-format
      - deepseek
      - --chat-template-kwargs
      - '{"enable_thinking":true,"preserve_thinking":true}'
      - --temp
      - "0.6"
      - --top-p
      - "0.95"
      - --top-k
      - "20"
      - --min-p
      - "0"
      - --presence-penalty
      - "0.2"
      - --repeat-penalty
      - "1.0"

  # -----------------------------------------------------------------------
  # GPU 0: Scout — mainline llama.cpp, single process, 4 parallel slots.
  # Model loaded ONCE (~3.7GB), shared across all slots via BPS batching.
  # MTP disabled (--np > 1 requires it — speculative decode is single-seq).
  # -----------------------------------------------------------------------
  llama-qwen35-4b-scout:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-qwen35-4b-scout
    restart: unless-stopped
    ports:
      - "0.0.0.0:11436:8080"
    volumes:
      - /home/kinetic/data/llm-models/qwen3.5-4b-gguf/unsloth-mtp:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --model
      - /models/Qwen3.5-4B-Q6_K.gguf
      - --no-mmap
      - -ngl
      - "99"
      # --ctx-size is total budget shared across all -np slots (not per-slot).
      # 150K per slot × 4 = 600K total.
      - --ctx-size
      - "614400"
      - -np
      - "4"
      - -b
      - "2048"
      - -ub
      - "512"
      - -ctk
      - q4_0
      - -ctv
      - q4_0
      - -fa
      - "on"
      - --jinja
      - --reasoning
      - "off"
      - --reasoning-format
      - deepseek
      - --chat-template-kwargs
      - '{"enable_thinking":false,"preserve_thinking":false}'
      - --temp
      - "0.7"
      - --top-p
      - "0.8"
      - --top-k
      - "20"
      - --min-p
      - "0"
      - --presence-penalty
      - "0"
      - --repeat-penalty
      - "1.0"

# ===========================================================================
# Migration from old 2x-replica architecture
# ===========================================================================
#
# Old: 2x ik-llama containers (scout-a :11436, scout-b :11438), each loading
#      the same Qwen3.5-4B-Q6_K weights (~6.2GB each = ~12.4GB total).
#      MTP enabled per-instance but no real concurrent batching.
#
# New: 1x mainline llama.cpp container (:11436), single model load (~3.7GB),
#      4 parallel slots with BPS continuous batching and prefix caching.
#      MTP disabled (incompatible with -np > 1).
#
# VRAM savings: ~12.4GB → ~3.7GB model + shared KV cache (~5-7GB total).
#
# Bifrost update: remove the stale -a-local and -b-local keys from the
# internal DB (they persist even after config.json edits):
#
#   curl -s localhost:11435/api/providers/vllm/keys \
#     -H "Authorization: Bearer bifrost"
#   curl -X DELETE localhost:11435/api/providers/vllm/keys/<key_id>
#
# Then restart bifrost so it picks up the consolidated config.json key.
# ===========================================================================
