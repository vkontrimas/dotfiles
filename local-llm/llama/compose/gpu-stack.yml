# ===========================================================================
# Combined stack: the GPU1 main model (Qwen3.6-27B-MTP-IQ4_KS, single-GPU,
# text-only) + the GPU0 scout model, running together. Each service is
# otherwise identical to its standalone compose file — see
# qwen3.6-27b-ik-iq4ks-mtp-solo.yml and qwen3.5-4b-scout-test.yml for the
# full ladder-test rationale/history behind each one's flags; this file just
# brings both up with a single `docker compose up -d` instead of two
# separate invocations, since they're meant to run concurrently (separate
# GPUs, separate ports — 11434 for the main model, 11436 for the scout).
#
# Scout model history: originally Qwen3.6-35B-A3B MoE with --cpu-moe/
# --n-cpu-moe expert offload (see git history / qwen3.6-35b-a3b-scout.yml if
# still present). Replaced with Qwen3.5-4B (dense, MTP-capable repo but MTP
# dropped here — see below) for better -np concurrency: a dense model avoids
# the CPU-RAM-bandwidth contention that --n-cpu-moe's offloaded experts hit
# under concurrent requests, and its much smaller weight footprint leaves
# far more VRAM budget for multiple parallel slots.
#
# Keep both standalone files in sync with this one if either gets re-tuned —
# this file duplicates their service blocks rather than importing them.
# ===========================================================================
services:
  ik-llama-qwen36-27b-mtp-iq4ks-solo:
    image: ghcr.io/ikawrakow/ik-llama-cpp@sha256:5f914f1ccade922417af58c94bd1cbb558052c8852d86678ead3fe693eec0143
    container_name: ik-llama-qwen36-27b-mtp-iq4ks-solo
    restart: unless-stopped
    ports:
      - "0.0.0.0:11434:8080"
    volumes:
      - /home/kinetic/data/llm-models/qwen3.6-27b-gguf/ubergarm-mtp-iq4ks:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --model
      - /models/Qwen3.6-27B-MTP-IQ4_KS.gguf
      - --no-mmap
      - -ngl
      - "99"
      - --ctx-size
      - "213000"
      - -b
      - "4096"
      - -ub
      - "1024"
      - -np
      - "1"
      - -ctk
      - q4_0
      - -ctv
      - q4_0
      - -khad
      - -vhad
      - -ngld
      - "99"
      - --spec-type
      - mtp:n_max=3,p_min=0.0
      - --recurrent-ckpt-mode
      - auto
      - --merge-qkv
      - -fa
      - "on"
      - --jinja
      - --parallel-tool-calls
      - --reasoning
      - "on"
      - --reasoning-format
      - deepseek
      - --chat-template-kwargs
      - '{"enable_thinking":true,"preserve_thinking":true}'
      - --temp
      - "0.6"
      - --top-p
      - "0.95"
      - --top-k
      - "20"
      - --min-p
      - "0"
      - --presence-penalty
      - "0.2"
      - --repeat-penalty
      - "1.0"

  ik-llama-qwen35-4b-scout:
    image: ghcr.io/ikawrakow/ik-llama-cpp@sha256:5f914f1ccade922417af58c94bd1cbb558052c8852d86678ead3fe693eec0143
    container_name: ik-llama-qwen35-4b-scout
    restart: unless-stopped
    ports:
      - "0.0.0.0:11436:8080"
    volumes:
      - /home/kinetic/data/llm-models/qwen3.5-4b-gguf/unsloth-mtp:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --model
      - /models/Qwen3.5-4B-Q6_K.gguf
      - -ngl
      - "99"
      - --ctx-size
      - "800000"
      - -np
      - "4"
      - -b
      - "2048"
      - -ub
      - "512"
      - -ctk
      - q4_0
      - -ctv
      - q4_0
      - -khad
      - -vhad
      - -fa
      - "on"
      - --jinja
      - --parallel-tool-calls
      - --reasoning
      - "off"
      - --reasoning-format
      - deepseek
      - --chat-template-kwargs
      - '{"enable_thinking":false,"preserve_thinking":false}'
      - --temp
      - "0.7"
      - --top-p
      - "0.8"
      - --top-k
      - "20"
      - --min-p
      - "0"
      - --presence-penalty
      - "0"
      - --repeat-penalty
      - "1.0"
