# ===========================================================================
# Qwen3.6-35B-A3B (unsloth/Qwen3.6-35B-A3B-GGUF, UD-Q4_K_M) — ik_llama.cpp,
# GPU0, MoE experts partially offloaded to system RAM via --n-cpu-moe.
#
# Scout/subagent model: dedicated to lightweight tasks (codebase scouting,
# small edits) that don't warrant the full 27B on GPU1. Runs concurrently
# with whichever GPU1 variant is up — separate GPU, separate port (11436,
# not the shared 11434 toggle group the GPU1 configs use).
#
# MoE layout: 256 experts (8 routed + 1 shared per token) across a hybrid
# 40-layer stack (10 blocks x [3 GatedDeltaNet + 1 standard attention] — only
# 1-in-4 layers is real attention, the rest is linear/SSM-style, which is why
# the KV cache footprint is much smaller than a normal 40-layer dense-
# attention model at this hidden size, though not zero — see ladder below).
#
# Goal per the user: leave GPU0 with ~8GB free for gaming/gamedev graphics
# work while running this model. RAM headroom for the CPU-resident experts:
# rig has 46GB total / ~23GB available.
#
# MEASURED HERE (ladder, all at boot unless noted): --cpu-moe (all 40 layers'
# experts on CPU) = 4314MB used / 19777MB free; --n-cpu-moe 20 (20 on GPU) =
# 13664MB used / 10427MB free; --n-cpu-moe 15 (25 on GPU) = 15978MB used at
# boot, but a REAL 62,024-token fill at 65536 ctx (94.6%) dropped to 7948MB
# free — just under the 8GB target. Settled on --n-cpu-moe 16 (24 on GPU):
# boot free 8614MB, real-fill free 8408MB at ~95% fill — comfortably above
# target. Decode measured at ~63.4 tok/s (400-token sample) at this setting,
# vs ~36.5 tok/s under the original all-CPU --cpu-moe.
#
# No MTP head on this model (unlike the Qwen3.6-27B-MTP-IQ4_KS siblings) —
# --spec-type/--merge-qkv omitted. --recurrent-ckpt-mode kept since the
# GatedDeltaNet layers are the same hybrid-SSM family as the 27B configs.
# --no-mmap NOT needed here (unlike the GPU1 solo fix) — most of this file
# stays CPU-resident by design (--n-cpu-moe), so mmap'd page cache for the
# expert tensors is exactly the memory-sharing behavior we want here, not
# something to fight.
# ===========================================================================
services:
  ik-llama-qwen36-35b-a3b-scout:
    image: ghcr.io/ikawrakow/ik-llama-cpp@sha256:5f914f1ccade922417af58c94bd1cbb558052c8852d86678ead3fe693eec0143
    container_name: ik-llama-qwen36-35b-a3b-scout
    restart: unless-stopped
    ports:
      - "0.0.0.0:11436:8080"
    volumes:
      - /home/kinetic/data/llm-models/qwen3.6-35b-a3b-gguf/unsloth-ud-q4km:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              # GPU0 — the display card, normally idle in this rig's other
              # configs (which all pin GPU1). Deliberately shares the card
              # with the desktop/gaming workload rather than GPU1.
              device_ids: ["0"]
              capabilities: [gpu]
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --model
      - /models/Qwen3.6-35B-A3B-UD-Q4_K_M.gguf
      - -ngl
      - "999"
      # Ladder: --cpu-moe (40 offloaded) = 4314MB used; --n-cpu-moe 20 (20 on
      # GPU) = 13664MB used / 10427MB free; --n-cpu-moe 15 (25 on GPU) =
      # 15978MB used at boot, but a real 62,024-token fill at 65536 ctx (94.6%)
      # dropped to 7948MB free — just under the 8GB target (the hybrid
      # GatedDeltaNet layout keeps KV growth small but non-zero). Backed off
      # to 16 (24 on GPU) to restore margin.
      - --n-cpu-moe
      - "16"
      - --ctx-size
      - "65536"
      - -b
      - "2048"
      - -ub
      - "512"
      - -np
      - "1"
      - -ctk
      - q4_0
      - -ctv
      - q4_0
      - -khad
      - -vhad
      - -ngld
      - "99"
      - --recurrent-ckpt-mode
      - auto
      - -fa
      - "on"
      - --jinja
      - --parallel-tool-calls
      - --reasoning
      - "on"
      - --reasoning-format
      - deepseek
      - --chat-template-kwargs
      - '{"enable_thinking":true,"preserve_thinking":true}'
      - --temp
      - "0.6"
      - --top-p
      - "0.95"
      - --top-k
      - "20"
      - --min-p
      - "0"
      - --presence-penalty
      - "0.2"
      - --repeat-penalty
      - "1.0"
