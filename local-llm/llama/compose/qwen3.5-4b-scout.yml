# ===========================================================================
# Qwen3.5-4B (unsloth/Qwen3.5-4B-MTP-GGUF, Q6_K) — ik_llama.cpp, GPU0.
# Scout/subagent model: replaces the earlier Qwen3.6-35B-A3B MoE scout
# (--cpu-moe/--n-cpu-moe expert offload) — dense and fully GPU-resident
# instead, so multiple -np slots are cheap rather than contending for CPU-RAM
# bandwidth the way offloaded MoE experts do under concurrent requests.
#
# No MTP here despite the repo name — Unsloth's own model card notes
# `-np > 1` isn't yet supported alongside MTP (single-sequence-only draft
# verification), which directly conflicts with the goal of this config
# (maximize concurrent slots). Dropped --spec-type entirely.
#
# QUANT: bumped from UD-Q4_K_XL to Q6_K after observing real looping/
# repetition at Q4 (verified via repeated-8-gram checks on list-generation
# prompts, not just anecdotal). At Q6_K the same tests came back clean.
# NOTE: also tried Qwen3.5-9B at the same Q6_K quant level as a "bigger is
# safer" alternative — it actually looped WORSE than the 4B on an identical
# test (re-drafted an entire 25-item list verbatim mid-generation), so bigger
# is not a substitute for the quant fix here. Stuck with 4B.
#
# REASONING: turned off (--reasoning off, enable_thinking:false). With
# reasoning on, the model would sometimes burn its entire token budget
# re-verifying/re-drafting its own answer inside the thinking block and
# never emit actual `content` (confirmed: content came back empty after
# 800 reasoning-only tokens on a list-generation prompt). Scout tasks
# (recon, small edits) don't need multi-step planning anyway. With
# reasoning off, the same tests terminate cleanly in 100-240 tokens with
# populated content and no repeated 8-grams (occasional 1-2 duplicate list
# items from normal sampling variance, not systemic looping).
#
# SAMPLING: switched to Qwen3.5's officially documented instruct/non-thinking
# mode params (temp/top_p differ from thinking-mode recs) — temperature=0.7,
# top_p=0.8, top_k=20, min_p=0, repeat_penalty=1.0. presence_penalty set to
# 0 (not the doc's recommended 1.5) per explicit override.
#
# MEASURED HERE: ctx-size is a TOTAL budget divided across -np slots, not
# per-slot. Ladder-tested at Q6_K: np=2 (180K/slot, total 368640) = 15.06GB
# free; np=4 (180K/slot, total 737280) = 11.5GB free — both comfortably
# above the original 8-8.5GB target, so context was bumped up rather than
# np: settled at np=4, 200K/slot (--ctx-size 800000) = 10.84GB free clean
# boot.
#
# CONCURRENCY CAVEAT (important, still applies): ik_llama.cpp's batch
# scheduler does NOT truly interleave large simultaneous prefills across
# slots — confirmed via server logs showing one slot fully draining its
# prompt before rotating to the next, even though all slots get dispatched
# within ~1s. Researched whether this is fixable via flags: NO — mainline
# llama.cpp gained pluggable batching strategies (Decode-Maximal/
# Prefill-Priority/Balanced) + chunked prefill in a PR merged 2026-05-16
# specifically for this; checked our pinned ik_llama.cpp image's --help
# directly and none of those flags exist. ik_llama.cpp is a quantization-
# focused fork that hasn't picked up mainline's serving/batching work
# (corroborated by ik_llama.cpp issue #1210: /slots and /health go fully
# unresponsive during prompt processing on that server). FOLLOW-UP: if
# concurrent heavy-prefill scouting becomes a real bottleneck, the fix is
# moving this model to mainline llama-server instead of ik_llama.cpp (loses
# Hadamard KV quant, gains real chunked-prefill interleaving) — not
# attempted this round, -np still mainly benefits many short/decode-bound
# requests rather than parallel heavy prefills landing simultaneously.
#
# TOOL BUDGET: subagents.overrides.scout.toolBudget is set in
# pi/agent/settings.json as an additional safety net against runaway
# tool-calling loops, independent of the generation-level fixes above.
#
# Same shared-toggle-adjacent pattern as its siblings: binds host port 11436,
# separate from the GPU1 main model's 11434. No waybar/daemon wiring.
# ===========================================================================
services:
  ik-llama-qwen35-4b-scout:
    image: ghcr.io/ikawrakow/ik-llama-cpp@sha256:5f914f1ccade922417af58c94bd1cbb558052c8852d86678ead3fe693eec0143
    container_name: ik-llama-qwen35-4b-scout
    restart: unless-stopped
    ports:
      - "0.0.0.0:11436:8080"
    volumes:
      - /home/kinetic/data/llm-models/qwen3.5-4b-gguf/unsloth-mtp:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              # GPU0 — the display card, normally idle in this rig's other
              # configs (which all pin GPU1). Deliberately shares the card
              # with the desktop/gaming workload rather than GPU1.
              device_ids: ["0"]
              capabilities: [gpu]
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --model
      - /models/Qwen3.5-4B-Q6_K.gguf
      - -ngl
      - "99"
      - --ctx-size
      - "800000"
      - -np
      - "4"
      - -b
      - "2048"
      - -ub
      - "512"
      - -ctk
      - q4_0
      - -ctv
      - q4_0
      - -khad
      - -vhad
      - -fa
      - "on"
      - --jinja
      - --parallel-tool-calls
      - --reasoning
      - "off"
      - --reasoning-format
      - deepseek
      - --chat-template-kwargs
      - '{"enable_thinking":false,"preserve_thinking":false}'
      - --temp
      - "0.7"
      - --top-p
      - "0.8"
      - --top-k
      - "20"
      - --min-p
      - "0"
      - --presence-penalty
      - "0"
      - --repeat-penalty
      - "1.0"
