    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --model
      - /models/Qwen3.5-4B-Q6_K.gguf
      - --no-mmap
      - -ngl
      - "99"
      - --ctx-size
      - "102400"
      - -np
      - "1"
      - --spec-type
      - mtp:n_max=2,p_min=0.0
      - -b
      - "2048"
      - -ub
      - "512"
      - -ctk
      - q4_0
      - -ctv
      - q4_0
      - -khad
      - -vhad
      - -fa
      - "on"
      - --jinja
      - --parallel-tool-calls
      - --reasoning
      - "off"
      - --reasoning-format
      - deepseek
