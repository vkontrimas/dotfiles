# Old architecture rationale (for historical context):
# - Two identical ik-llama containers on GPU0 (ports 11436 + 11438)
# - Each loaded Qwen3.5-4B-Q6_K independently (~6.2GB each = ~12.4GB total)
# - MTP enabled per-instance (np=1, so MTP + np were compatible)
# - Bifrost load-balanced across both under model id qwen3.5-4b-scout
# - Workaround for ik_llama.cpp's single-process batch scheduler not
#   interleaving large simultaneous prefills across -np slots
#
# New architecture (in gpu-stack.yml):
# - Single mainline ghcr.io/ggml-org/llama.cpp:server-cuda on GPU0 (:11436)
# - Single model load (~3.7GB), 4 parallel slots via BPS continuous batching
# - MTP disabled (incompatible with -np > 1 in all llama.cpp variants)
# - Proper prefix caching, no duplicate weights, real concurrent prefill
