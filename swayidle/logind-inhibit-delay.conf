# Installed to /etc/systemd/logind.conf.d/10-inhibit-delay.conf
#
# swayidle's before-sleep hook tears down the running vLLM container before the
# machine suspends, and that teardown (docker compose down) can take longer than
# logind's default 5s inhibitor window. Raise the window so suspend waits for the
# GPU to be released instead of racing ahead of it.
[Login]
InhibitDelayMaxSec=30
